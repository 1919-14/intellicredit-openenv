name: Setup Version Branches

on:
  workflow_dispatch:
    inputs:
      v1_commit:
        description: 'Commit SHA to tag as v1 (leave blank to use current HEAD of main)'
        required: false
        default: ''

jobs:
  setup-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve v1 commit
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.v1_commit }}" ]; then
            echo "sha=${{ github.event.inputs.v1_commit }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create v1 tag
        run: |
          SHA="${{ steps.resolve.outputs.sha }}"
          if git rev-parse "refs/tags/v1" >/dev/null 2>&1; then
            echo "Tag v1 already exists, skipping."
          else
            git tag -a v1 "$SHA" -m "IntelliCredit v1 — stable release"
            git push origin v1
            echo "Created tag v1 → $SHA"
          fi

      - name: Create v2 branch
        run: |
          if git ls-remote --heads origin v2 | grep -q v2; then
            echo "Branch v2 already exists, skipping."
          else
            git checkout -b v2
            git push origin v2
            echo "Created branch v2 from $(git rev-parse HEAD)"
          fi
